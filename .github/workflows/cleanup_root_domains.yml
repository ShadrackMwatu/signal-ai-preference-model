name: Cleanup root domain structure

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup-root:
    if: contains(github.event.head_commit.message, '[cleanup-trigger]')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "Signal Repository Cleanup"
          git config user.email "actions@github.com"

      - name: Delete non-domain root items
        shell: bash
        run: |
          set -euo pipefail

          keep_root_item() {
            case "$1" in
              .git|.github|.gitattributes|.gitignore|README.md|requirements.txt|app.py|pytest.ini|Signal_CGE|Behavioral_Signals_AI)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          echo "Root items before cleanup:"
          find . -maxdepth 1 -mindepth 1 -printf '%f\n' | sort

          while IFS= read -r item; do
            item="${item#./}"
            if keep_root_item "$item"; then
              continue
            fi
            echo "Deleting non-domain root item: $item"
            git rm -r -- "$item"
          done < <(find . -maxdepth 1 -mindepth 1 -print | sort)

          cat > README.md <<'EOF'
          ---
          title: Signal AI Dashboard
          emoji: 📊
          colorFrom: blue
          colorTo: green
          sdk: gradio
          sdk_version: 5.13.0
          app_file: app.py
          pinned: false
          ---

          # Signal AI Preference Model

          Signal is organized into two major product folders:

          1. **Signal_CGE** — SAM/CGE/SML economic modeling, solver backends, policy simulation, GAMS integration, diagnostics, reporting, and economic learning services.
          2. **Behavioral_Signals_AI** — privacy-preserving behavioral intelligence, aggregate demand prediction, opportunity scoring, live trend intelligence, adaptive learning, API/app support, and explainability.

          ## Repository Structure

          ```text
          Signal_CGE/
          Behavioral_Signals_AI/
          app.py
          requirements.txt
          README.md
          pytest.ini
          .github/
          .gitattributes
          .gitignore
          ```

          The root keeps only deployment and repository-control files required by Hugging Face, GitHub Actions, Git LFS, and local testing. Product code should live inside either `Signal_CGE/` or `Behavioral_Signals_AI/`.
          EOF

          git add README.md
          if git diff --cached --quiet; then
            echo "No non-domain root items found. Root already clean."
            exit 0
          fi

          git commit -m "Delete non-domain root items after two-domain migration"
          git push
