name: Reorganize Signal domains

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  reorganize:
    if: contains(github.event.head_commit.message, '[reorg-trigger]')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "Signal Repository Organizer"
          git config user.email "actions@github.com"

      - name: Reorganize into two product domains
        shell: bash
        run: |
          set -euo pipefail

          BEHAVIORAL="Behavioral_Signals_AI"
          CGE="Signal_CGE"

          mkdir -p "$BEHAVIORAL" "$CGE"

          move_if_exists() {
            local source="$1"
            local target_root="$2"
            if [ -e "$source" ]; then
              if [ "$source" = "$target_root" ]; then
                return 0
              fi
              mkdir -p "$target_root"
              git mv "$source" "$target_root/"
            fi
          }

          # Signal_CGE domain: economic modeling, SAM/CGE/SML, solvers, GAMS, policy simulation.
          # Existing top-level Signal_CGE remains the canonical CGE folder.
          for item in \
            signal_cge \
            signal_ai \
            policy_ai \
            policy_intelligence \
            backends \
            cge_core \
            cge_engine \
            cge_workbench \
            signal_execution \
            signal_modeling_language \
            signal_sml \
            sml_workbench \
            solvers \
            models \
            documents
          do
            move_if_exists "$item" "$CGE"
          done

          # Behavioral_Signals_AI domain: behavioral prediction, live trends, ML, privacy, API/app support, learning memory.
          for item in \
            Documentation \
            adaptive_learning \
            api \
            app_routes \
            behavioral_ai \
            config \
            data \
            docs \
            explainability \
            knowledge_base \
            learning \
            learning_memory \
            learning_versions \
            live_trends \
            ml \
            models_ml \
            outputs \
            signal_learning \
            src
          do
            move_if_exists "$item" "$BEHAVIORAL"
          done

          for item in \
            adaptive_learning.py \
            explainability.py \
            privacy.py \
            train_model.py \
            trend_intelligence.py \
            x_trends.py
          do
            move_if_exists "$item" "$BEHAVIORAL"
          done

          move_if_exists "tests" "$CGE"

          python - <<'PY'
          from pathlib import Path

          app = Path('app.py')
          if app.exists():
              text = app.read_text(encoding='utf-8')
              marker = '# Signal domain path bootstrap'
              if marker not in text:
                  bootstrap = '''# Signal domain path bootstrap\nfrom pathlib import Path as _SignalPath\nimport sys as _signal_sys\n_signal_root = _SignalPath(__file__).resolve().parent\nfor _signal_path in (\n    _signal_root / "Behavioral_Signals_AI",\n    _signal_root / "Signal_CGE",\n):\n    if _signal_path.exists() and str(_signal_path) not in _signal_sys.path:\n        _signal_sys.path.insert(0, str(_signal_path))\n\n'''
                  app.write_text(bootstrap + text, encoding='utf-8')
          PY

          cat > "$BEHAVIORAL/README.md" <<'EOF'
          # Behavioral_Signals_AI

          This folder contains Signal's behavioral intelligence domain: aggregate behavioral signals, demand prediction, opportunity scoring, live trends, privacy-preserving analytics, adaptive learning, API support, dashboard routes, and explainability.
          EOF

          cat > "$CGE/README.md" <<'EOF'
          # Signal_CGE

          This folder contains Signal's economic modeling domain: SAM loading, validation, multiplier analysis, CGE/SML workbench, GAMS/Python solver backends, policy simulation, diagnostics, reporting, and model-learning services.

          The canonical production package is `Signal_CGE/signal_cge`.
          EOF

          cat > README.md <<'EOF'
          ---
          title: Signal AI Dashboard
          emoji: 📊
          colorFrom: blue
          colorTo: green
          sdk: gradio
          sdk_version: 5.13.0
          app_file: app.py
          pinned: false
          ---

          # Signal AI Preference Model

          Signal is organized into two major product folders:

          1. **Signal_CGE** — SAM/CGE/SML economic modeling, solver backends, policy simulation, GAMS integration, diagnostics, reporting, and economic learning services.
          2. **Behavioral_Signals_AI** — privacy-preserving behavioral intelligence, aggregate demand prediction, opportunity scoring, live trend intelligence, adaptive learning, API/app support, and explainability.

          ## Repository Structure

          ```text
          Signal_CGE/
          Behavioral_Signals_AI/
          app.py
          requirements.txt
          README.md
          pytest.ini
          .github/
          .gitattributes
          .gitignore
          ```

          The root keeps only deployment and repository-control files required by Hugging Face, GitHub Actions, Git LFS, and local testing. Product code should live inside either `Signal_CGE/` or `Behavioral_Signals_AI/`.
          EOF

          git add -A
          if git diff --cached --quiet; then
            echo "No domain reorganization changes were needed."
            exit 0
          fi

          git commit -m "Reorganize repository into Signal_CGE and Behavioral_Signals_AI domains"
          git push
