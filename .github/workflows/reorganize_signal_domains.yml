name: Reorganize Signal domains

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  reorganize:
    if: contains(github.event.head_commit.message, '[reorg-trigger]')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "Signal Repository Organizer"
          git config user.email "actions@github.com"

      - name: Reorganize into exact two product domains
        shell: bash
        run: |
          set -euo pipefail

          BEHAVIORAL="Behavioral_Signals_AI"
          CGE="Signal_CGE"
          mkdir -p "$BEHAVIORAL" "$CGE"
          mkdir -p "$BEHAVIORAL/_migrated_root" "$CGE/_migrated_root"

          is_preserved_root_item() {
            case "$1" in
              .git|.github|.gitattributes|.gitignore|README.md|requirements.txt|app.py|pytest.ini|$BEHAVIORAL|$CGE)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          is_cge_item() {
            case "$1" in
              Signal_CGE|signal_cge|signal_ai|policy_ai|policy_intelligence|backends|cge_core|cge_engine|cge_workbench|signal_execution|signal_modeling_language|signal_sml|sml_workbench|solvers|models|documents|tests)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          safe_git_mv() {
            local source="$1"
            local target_root="$2"
            local name
            name="$(basename "$source")"

            if [ ! -e "$source" ]; then
              return 0
            fi
            if [ "$source" = "$target_root" ]; then
              return 0
            fi

            if [ ! -e "$target_root/$name" ]; then
              git mv "$source" "$target_root/$name"
            else
              mkdir -p "$target_root/_migrated_root"
              local destination="$target_root/_migrated_root/$name"
              local counter=1
              while [ -e "$destination" ]; do
                destination="$target_root/_migrated_root/${name}_$counter"
                counter=$((counter + 1))
              done
              git mv "$source" "$destination"
            fi
          }

          # Move every non-preserved root item into exactly one of the two domains.
          while IFS= read -r item; do
            item="${item#./}"
            if is_preserved_root_item "$item"; then
              continue
            fi
            if is_cge_item "$item"; then
              safe_git_mv "$item" "$CGE"
            else
              safe_git_mv "$item" "$BEHAVIORAL"
            fi
          done < <(find . -maxdepth 1 -mindepth 1 -print | sort)

          # Keep app.py at root, but let it find packages inside both domains.
          python - <<'PY'
          from pathlib import Path

          app = Path('app.py')
          if app.exists():
              text = app.read_text(encoding='utf-8')
              marker = '# Signal domain path bootstrap'
              if marker not in text:
                  bootstrap = '''# Signal domain path bootstrap\nfrom pathlib import Path as _SignalPath\nimport sys as _signal_sys\n_signal_root = _SignalPath(__file__).resolve().parent\nfor _signal_path in (\n    _signal_root / "Behavioral_Signals_AI",\n    _signal_root / "Signal_CGE",\n    _signal_root / "Signal_CGE" / "_migrated_root",\n    _signal_root / "Behavioral_Signals_AI" / "_migrated_root",\n):\n    if _signal_path.exists() and str(_signal_path) not in _signal_sys.path:\n        _signal_sys.path.insert(0, str(_signal_path))\n\n'''
                  app.write_text(bootstrap + text, encoding='utf-8')
          PY

          cat > "$BEHAVIORAL/README.md" <<'EOF'
          # Behavioral_Signals_AI

          This folder contains Signal's behavioral intelligence domain: aggregate behavioral signals, demand prediction, opportunity scoring, live trends, privacy-preserving analytics, adaptive learning, API support, dashboard routes, and explainability.

          `_migrated_root/` contains root-level behavioral or compatibility files moved during the two-domain cleanup when a same-name destination already existed.
          EOF

          cat > "$CGE/README.md" <<'EOF'
          # Signal_CGE

          This folder contains Signal's economic modeling domain: SAM loading, validation, multiplier analysis, CGE/SML workbench, GAMS/Python solver backends, policy simulation, diagnostics, reporting, and model-learning services.

          The canonical production package is `Signal_CGE/signal_cge`. `_migrated_root/` contains root-level CGE or compatibility files moved during the two-domain cleanup when a same-name destination already existed.
          EOF

          cat > README.md <<'EOF'
          ---
          title: Signal AI Dashboard
          emoji: 📊
          colorFrom: blue
          colorTo: green
          sdk: gradio
          sdk_version: 5.13.0
          app_file: app.py
          pinned: false
          ---

          # Signal AI Preference Model

          Signal is organized into two major product folders:

          1. **Signal_CGE** — SAM/CGE/SML economic modeling, solver backends, policy simulation, GAMS integration, diagnostics, reporting, and economic learning services.
          2. **Behavioral_Signals_AI** — privacy-preserving behavioral intelligence, aggregate demand prediction, opportunity scoring, live trend intelligence, adaptive learning, API/app support, and explainability.

          ## Repository Structure

          ```text
          Signal_CGE/
          Behavioral_Signals_AI/
          app.py
          requirements.txt
          README.md
          pytest.ini
          .github/
          .gitattributes
          .gitignore
          ```

          The root keeps only deployment and repository-control files required by Hugging Face, GitHub Actions, Git LFS, and local testing. Product code should live inside either `Signal_CGE/` or `Behavioral_Signals_AI/`.
          EOF

          git add -A
          if git diff --cached --quiet; then
            echo "No domain reorganization changes were needed."
            exit 0
          fi

          git commit -m "Physically move root files into Signal_CGE and Behavioral_Signals_AI"
          git push
