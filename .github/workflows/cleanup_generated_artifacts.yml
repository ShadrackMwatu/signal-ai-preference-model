name: Cleanup generated artifacts

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup-generated-artifacts:
    if: contains(github.event.head_commit.message, '[cleanup-artifacts]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "Signal Cleanup Bot"
          git config user.email "actions@github.com"

      - name: Remove tracked generated artifacts from Git index
        shell: bash
        run: |
          set -e

          paths=(
            "Signal_CGE/tests/_tmp"
            "Signal_CGE/tests/tmp"
            "Signal_CGE/tests/runner_outputs"
            "Signal_CGE/tests/learning_runner_outputs"
            "Behavioral_Signals_AI/tmp"
            "Behavioral_Signals_AI/cache"
          )

          for p in "${paths[@]}"; do
            if [ -e "$p" ]; then
              git rm -r --cached "$p" || true
            fi
          done

          find . -type d -name "__pycache__" -print0 | while IFS= read -r -d '' d; do
            git rm -r --cached "$d" || true
          done

          find . -type f \( -name "*.pyc" -o -name "*.pyo" -o -name "*.joblib" -o -name "*.xlsx" -o -name "*.xlsm" -o -name "*.xls" \) -print0 | while IFS= read -r -d '' f; do
            git rm --cached "$f" || true
          done

          mkdir -p Signal_CGE/outputs
          touch Signal_CGE/outputs/.gitkeep

          git add .gitignore Signal_CGE/outputs/.gitkeep

          if git diff --cached --quiet; then
            echo "No generated artifacts tracked."
            exit 0
          fi

          git commit -m "Remove generated artifacts from repository tracking"
          git push
