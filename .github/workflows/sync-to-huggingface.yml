name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sync to Hugging Face
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ShadrackMwatu/signal-ai-preference-model
          huggingface_repo_id: Signal-ai/signal-ai-dashboard
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: gradio
