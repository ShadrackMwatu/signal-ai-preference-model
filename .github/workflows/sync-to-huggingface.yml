name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install Hugging Face Hub
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])

          ignore_patterns = [
              ".git/**",
              ".github/**",
              "Signal_CGE/models/gams/20_Data/*.xlsx",
              "Signal_CGE/models/gams/20_Data/*.xlsm",
              "Signal_CGE/models/gams/20_Data/*.gdx",
              "Signal_CGE/models/gams/20_Data/*.lst",
              "Signal_CGE/models/gams/20_Data/*.log",
              "**/__pycache__/**",
              "**/.pytest_cache/**",
          ]

          api.upload_folder(
              folder_path=".",
              repo_id="Signal-ai/signal-ai-dashboard",
              repo_type="space",
              ignore_patterns=ignore_patterns,
              delete_patterns=[
                  "Signal_CGE/models/gams/20_Data/*.xlsx",
                  "Signal_CGE/models/gams/20_Data/*.xlsm",
                  "Signal_CGE/models/gams/20_Data/*.gdx",
                  "Signal_CGE/models/gams/20_Data/*.lst",
                  "Signal_CGE/models/gams/20_Data/*.log",
              ],
              commit_message="Sync Signal app from GitHub",
          )
          PYs