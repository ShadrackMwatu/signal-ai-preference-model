name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo without LFS files
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Prepare clean Hugging Face deploy folder
        run: |
          mkdir hf_deploy
          rsync -av ./ hf_deploy/ \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "hf_deploy/" \
            --exclude "Signal_CGE/models/gams/20_Data/*.xlsx" \
            --exclude "Signal_CGE/models/gams/20_Data/*.xlsm" \
            --exclude "Signal_CGE/models/gams/20_Data/*.gdx" \
            --exclude "Signal_CGE/models/gams/20_Data/*.lst" \
            --exclude "Signal_CGE/models/gams/20_Data/*.log" \
            --exclude "**/__pycache__/" \
            --exclude "**/.pytest_cache/"

      - name: Install Hugging Face Hub
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade huggingface_hub

      - name: Upload clean folder to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])

          api.upload_folder(
              folder_path="hf_deploy",
              repo_id="Signal-ai/signal-ai-dashboard",
              repo_type="space",
              commit_message="Sync Signal app from GitHub without local GAMS data",
          )
          PY