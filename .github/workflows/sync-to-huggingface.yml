name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sync to Hugging Face
        uses: huggingface/hub-sync@v0.1.0
        with:
          repo: Signal-ai/signal-ai-dashboard
          token: ${{ secrets.HF_TOKEN }}
          private: false
